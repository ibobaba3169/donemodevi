<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İbrahim Erenkuş - Arayüz</title>
    <style>

        body {
            background-color: #ffb7ca; 
            font-family: 'Times New Roman', Times, serif;
            margin: 0;
            padding: 40px;
        }

        h1 {
            font-size: 42px;
            color: #000000;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            font-weight: normal;
        }

        .sub-title {
            font-size: 24px;
            font-style: italic;
            font-weight: bold;
            color: #000000;
            margin-bottom: 30px;
        }

        .menu-link {
            display: block;
            font-size: 20px;
            color: #0000ff;
            text-decoration: underline;
            margin-bottom: 15px;
            cursor: pointer;
            width: fit-content;
        }

        .content-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            max-width: 450px;
        }

        #game-canvas {
            background-color: #111;
            display: block;
            margin: 10px auto;
            border: 4px solid #333;
        }
        .game-container {
            text-align: center;
        }
        .score-board {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .submit-btn {
            background-color: #0000ff;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .submit-btn:hover {
            background-color: #0000cc;
        }
    </style>
</head>
<body>
   <h1>İBRAHİM ERENKUŞ</h1>
    <div class="sub-title">11B 1669</div>
    <div class="menu-link" onclick="showSection('game-section'); initGame();">oyun için tıkla</div>
    <div class="menu-link" onclick="showSection('register-section')">üyelik için tıkla</div>

    <div id="game-section" class="content-section">
        <div class="game-container">
            <div class="score-board">Skor: <span id="score">0</span></div>
            <p style="font-size: 14px; margin: 0 0 10px 0;">Yönlendirmek için Yön Tuşlarını veya WASD kullanın.</p>
            <canvas id="game-canvas" width="400" height="400"></canvas>
        </div>
    </div>

    <div id="register-section" class="content-section">
        <h2 style="margin-top: 0;">Kayıt Ol</h2>
        <form onsubmit="alert('Kayıt başarılı!'); return false;">
            <div class="form-group">
                <label for="username">Kullanıcı Adı:</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="email">E-posta:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Şifre:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="submit-btn">Kaydı Tamamla</button>
        </form>
    </div>

    <script>
        function showSection(sectionId) {
            // Önce tüm bölümleri gizle
            document.getElementById('game-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'none';
            
            // Tıklanan bölümü göster
            document.getElementById(sectionId).style.display = 'block';
        }

        const canvas = document.getElementById("game-canvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake, food, dx, dy, score, gameInterval;

        function initGame() {
            snake = [{ x: 10, y: 10 }];
            food = { x: 5, y: 5 };
            dx = 1; 
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            
            clearInterval(gameInterval);
            gameInterval = setInterval(updateGame, 100);
        }

        function updateGame() {
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }


            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                generateFood();
            } else {
                // Yem yemediyse kuyruğu sil (böylece ilerlemiş olur)
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff00";
            for (let cell of snake) {
                ctx.fillRect(cell.x * gridSize, cell.y * gridSize, gridSize - 2, gridSize - 2);
            }
            ctx.fillStyle = "#ff0000";
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
        }

        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
        }

        function gameOver() {
            clearInterval(gameInterval);
            alert("Oyun Bitti! Skorunuz: " + score);
            initGame(); // Oyunu otomatik yeniden başlat
        }

        window.addEventListener("keydown", e => {
            switch (e.key) {
                case "ArrowUp":    case "w": case "W": if (dy === 0) { dx = 0; dy = -1; } break;
                case "ArrowDown":  case "s": case "S": if (dy === 0) { dx = 0; dy = 1; } break;
                case "ArrowLeft":  case "a": case "A": if (dx === 0) { dx = -1; dy = 0; } break;
                case "ArrowRight": case "d": case "D": if (dx === 0) { dx = 1; dy = 0; } break;
            }
        });
    </script>
</body>
</html>
